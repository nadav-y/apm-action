name: 'Setup APM'
description: 'Install agent primitives (skills, instructions, agents) for your CI workflows. One line. Zero config.'
author: 'microsoft'
branding:
  icon: 'package'
  color: 'purple'

inputs:
  working-directory:
    description: 'Working directory for execution. In non-isolated mode, this directory must exist and contain your apm.yml. In isolated, pack, or bundle modes the action creates it automatically.'
    required: false
    default: '.'
  apm-version:
    description: |
      APM CLI version to install (e.g. "0.13.0"). Defaults to a pinned, known-good release.
      The default is intentionally NOT "latest": pinning the action to a specific APM version
      prevents downstream workflows from being broken by an unrelated APM release. Pass
      "latest" explicitly to opt in to floating, or pin to a different tag for reproducibility.
    required: false
    default: '0.13.0'
  script:
    description: 'APM script to run after install (optional — by default only install runs)'
    required: false
    default: ''
  dependencies:
    description: 'YAML array of extra dependencies to install (additive to apm.yml). Supports strings (owner/repo) and objects ({git: url, path: subdir, ref: branch}).'
    required: false
    default: ''
  isolated:
    description: 'Ignore apm.yml and clear pre-existing primitive dirs (instructions/, agents/, skills/, prompts/) under .github/ — install only the inline dependencies'
    required: false
    default: 'false'
  compile:
    description: 'Run apm compile after install to generate AGENTS.md'
    required: false
    default: 'false'
  pack:
    description: 'Pack a bundle after install. Format is controlled by `bundle-format` (default: apm). Produces .tar.gz by default.'
    required: false
    default: 'false'
  bundle-format:
    description: |
      Format for `pack: true`. One of:
        - apm     (default)  Classic APM bundle: apm.lock.yaml + .github/.claude trees.
                             Round-trips through this action's restore mode.
        - plugin             Claude Code marketplace layout: plugin.json + flat
                             agents/, skills/, commands/, instructions/ dirs.
                             NOTE: plugin-format restore is NOT supported by this
                             action yet -- consume plugin bundles with your plugin
                             tooling, or re-pack with bundle-format: apm.
    required: false
    default: ''
  bundle:
    description: 'Restore from a bundle (local path or glob pattern). Skips APM installation entirely.'
    required: false
    default: ''
  bundles-file:
    description: |
      Path to a UTF-8 text file with one bundle path per line (paths must end
      in '.tar.gz'). Lines starting with '#' are comments; blank lines are
      ignored. Glob patterns are NOT expanded -- generate the list yourself
      with 'find ... | sort' or equivalent.
      Bundles are restored in caller-specified order (later bundles win on
      file collisions; the action emits a warning before the loop runs so
      the policy is explicit). Mutually exclusive with 'pack' and 'bundle'.
    required: false
    default: ''
  target:
    description: 'Target harness: copilot, claude, cursor, codex, opencode, gemini, windsurf, agent-skills, or a CSV of any of these. Used with pack: true to set the bundle target, and (isolated: true) to declare the install target in the generated apm.yml. APM v0.12.3+ requires an explicit target signal — set this whenever isolated mode is used outside a checkout that already contains a harness marker.'
    required: false
    default: ''
  archive:
    description: 'Produce .tar.gz instead of directory (used with pack: true)'
    required: false
    default: 'true'
  marketplace:
    description: |
      Forwarded to `apm pack --marketplace=<value>` (used with pack: true).
      Controls which marketplace formats are emitted alongside the bundle.
      Accepts a comma-separated list of format names ('claude,codex'),
      'all' (every configured format), or 'none' (skip marketplace files).
      Defaults to whatever is configured in apm.yml's `outputs:` map.
    required: false
    default: ''
  marketplace-path:
    description: |
      Forwarded to `apm pack --marketplace-path FORMAT=PATH` (used with
      pack: true). Repeatable: one override per line. Each entry must be
      in `FORMAT=PATH` shape (e.g. `claude=marketplace.json`). Overrides
      the output path for the named format; useful for placing files at
      vendor-expected locations within the same release artifact set.
      Separator is newline only -- `,` is a legal filename character and
      is not used as a separator.
    required: false
    default: ''
  json-output:
    description: |
      Forwarded to `apm pack --json` (used with pack: true). When set, the
      action passes --json to the CLI and captures the JSON report to this
      path (relative to working-directory, or absolute). The JSON report
      is the source of truth for what was produced -- consume it from
      downstream steps via the `pack-json` output.
    required: false
    default: ''
  offline:
    description: |
      Forwarded to `apm pack --offline` (used with pack: true). Skips
      network resolution of marketplace dependency refs. Useful in
      hermetic CI environments where the resolved versions are already
      pinned in apm.lock.yaml.
    required: false
    default: 'false'
  include-prerelease:
    description: |
      Forwarded to `apm pack --include-prerelease` (used with pack: true).
      Considers pre-release version tags when resolving marketplace
      dependency refs. Off by default to keep release builds reproducible.
    required: false
    default: 'false'
  github-token:
    description: 'GitHub token for API calls (avoids rate limits). Defaults to the automatic GITHUB_TOKEN.'
    required: false
    default: '${{ github.token }}'
  audit-report:
    description: 'Generate a SARIF audit report during install/unpack. Set to "true" for default path (apm-audit.sarif), or provide a custom file path.'
    required: false
    default: ''
  setup-only:
    description: 'Install the APM CLI onto PATH and exit. Skips apm install and all project-level operations. Use subsequent steps to run apm commands directly. Mutually exclusive with pack, bundle, bundles-file, isolated, compile, script, dependencies, audit-report, target, bundle-format, marketplace, marketplace-path, json-output, offline, include-prerelease.'
    required: false
    default: 'false'

outputs:
  success:
    description: 'Whether the action succeeded (true/false)'
  primitives-path:
    description: 'Path where agent primitives were deployed (.github)'
  bundle-path:
    description: 'Path to the packed bundle (only set in pack mode). Empty string when the project produced only marketplace artifacts (no `dependencies:` block in apm.yml) -- consume `pack-json` to discover what was emitted.'
  bundle-format:
    description: 'Format of the produced or restored bundle: "apm" or "plugin". Set in pack mode and single-bundle restore mode.'
  pack-json:
    description: 'Path to the captured `apm pack --json` report (set when the `json-output` input was provided). Contains the structured list of every artifact produced by the pack -- bundles, marketplace files, sidecars. Source of truth for downstream steps that need to enumerate outputs without globbing the build/ directory.'
  audit-report-path:
    description: 'Path to the generated SARIF audit report, if audit-report was enabled'
  bundles-restored:
    description: 'Number of bundles successfully restored (multi-bundle mode only).'
  apm-version:
    description: 'Resolved APM CLI version string (e.g. "0.11.0"). Always set.'
  apm-path:
    description: 'Full path to the apm executable used by the action. Resolved via tool-cache when the action installed APM, or via `which apm` when reusing a pre-existing apm on PATH.'

runs:
  using: 'node24'
  main: 'dist/index.js'
